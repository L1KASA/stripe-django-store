{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-8">
    <h1 class="text-3xl font-bold text-gray-900 mb-4">{{ item.name }}</h1>
    {% if item.description %}
    <p class="text-gray-700 text-lg mb-8">{{ item.description }}</p>
    {% endif %}

    <div class="bg-blue-50 rounded-lg p-6 mb-8">
        <div class="text-4xl font-bold text-blue-600">{{ item.formatted_price }}</div>
        <div class="text-gray-500 mt-2">per item</div>
    </div>

    <form action="{% url 'create_order' item.id %}" method="post">
        {% csrf_token %}
        <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-lg text-lg mb-4">
            Add to Order
        </button>
    </form>

    <a href="{% url 'create_order_direct' item.id %}"
        class="block w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-6 rounded-lg text-lg text-center">
        Buy with Payment Intent (Direct)
    </a>
    <p id="error-message" class="text-red-500 text-center mt-4 hidden"></p>
</div>
{% endblock %}
