{% extends 'base.html' %}

{% block content %}
<div class="mb-8">
    <h1 class="text-3xl font-bold text-gray-900">Our Products</h1>
    <p class="text-gray-600 mt-2">Select a product to purchase</p>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    {% for item in items %}
    <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition-shadow">
        <div class="bg-gradient-to-r from-blue-500 to-purple-600 h-40 p-4 flex items-end">
            <span class="text-white text-2xl font-bold">{{ item.price }} {{ item.currency }}</span>
        </div>
        <div class="p-6">
            <h2 class="text-xl font-semibold text-gray-900 mb-3">{{ item.name }}</h2>
            <a href="{% url 'item_detail' item.id %}"
               class="block w-full bg-blue-600 hover:bg-blue-700 text-white text-center py-3 px-4 rounded-lg font-medium">
                View Product
            </a>
        </div>
    </div>
    {% empty %}
    <div class="col-span-full text-center py-12">
        <p class="text-lg text-gray-500">No products available yet</p>
        <a href="/admin/" class="text-blue-600 font-medium mt-2 inline-block">Add products in Admin</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
